<svg width="512" height="512" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: dark theme (Graphite BG) -->
  <rect x="0" y="0" width="200" height="200" rx="40" ry="40" fill="#15161a"/>

  <!-- W shape built from 4 overlapping rounded capsule strokes -->
  <line x1="38" y1="56" x2="62" y2="144" stroke="#E8B45A" stroke-width="16" stroke-linecap="round"/>
  <line x1="62" y1="144" x2="76" y2="92" stroke="#3F8CFF" stroke-width="16" stroke-linecap="round"/>
  <line x1="76" y1="92" x2="90" y2="144" stroke="#FF7A8A" stroke-width="16" stroke-linecap="round"/>
  <line x1="90" y1="144" x2="114" y2="56" stroke="#6FB5D6" stroke-width="16" stroke-linecap="round"/>

  <!-- Separate side vertical accent bar -->
  <line x1="158" y1="50" x2="158" y2="150" stroke="#A35CD1" stroke-width="22" stroke-linecap="round"/>
</svg>
